<div class="qna-question__list" data-question-list>
    <div class="qna-question__listCont" data-question-list-container>
        <div class="qna-question__textCont">
            <div class="qna-question__icon">
                <span class="cl-icon cl-icon--instruction"></span>
            </div>
            <div class="qna-question__text">
                <p class="qna-question__questionText">{{=it.question}}</p>
            </div>
        </div>
        <div class="qna-question__removeCont">
            <div class="qna-question__remove" data-remove-question>
                <span class="qna-question__removeIcon cl-icon cl-icon--remove"></span>
                <span class="qna-question__removeText" data-commentId="{{=it.Id}}">{{=it.removeQuestion}}</span>
            </div>
        </div>
    </div>
</div>
