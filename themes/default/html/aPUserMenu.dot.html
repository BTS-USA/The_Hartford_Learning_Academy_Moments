            <article class="apum-bar">

                    <h1 class="apum__title" data-title>{{?it.currentActionObject}}{{=it.currentActionObject.title}}{{?}}</h1>

                </header>
                <div class="apum-tab-container" data-apum-tab-container>
                    {{~it.tabOptions :rootMenuItem:rootMenuIndex}}
                    {{?rootMenuItem.enabledByField && it.assessmentBasicData[rootMenuItem.enabledByField]}}

                </div>
