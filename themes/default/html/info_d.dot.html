<div class="mainContentWrapper">
    <div class="mainContent">
        <section class="ic cl-component">

            {{? it.header}}
            <header class="ic-header--main cl-header--main">
                {{? it.header.breadCrumbs}}
                    <p class="ic-breadCrumbs-main cl-header-breadCrumbs--main">{{=it.header.breadCrumbs}}</p>
                {{?}}
                {{? it.header.bgimage}}
                 <div class="ic-header-image cl-header-image" style="background-image:url({{=it.header.bgimage}})"></div>
                {{?}}
                <div class="ic-header-wrapper cl-header-wrapper">
                    {{? it.header.title}}
                    <h1 class="ic-header__title--main cl-header__title--main{{? !it.header.description}} cl-margin--no{{?}}">
                        {{=it.header.title}}
                    </h1>
                    {{?}}
                    {{? it.header.description}}
                    <p class="ic-header__description--main cl-header__description--main">
                        {{=it.header.description}}
                    </p>
                    {{?}}
                </div>
            </header>
            {{?}}

            <div class="ic-container cl-container">
                <div class="cl-xs-column-12 cl-row">
                    {{? it.instructions}}
                    <div class="ic-instructions cl-instructions">
                        <p class="ic-instructions__text cl-instructions__text">{{=it.instructions}}</p>
                    </div>
                    {{?}}
                    <article class="ic-article cl-row">
                        <div class="ic-summary__header" data-summaryheader>
                            <p class="ic-summary__header-text" data-summaryheadertext>{{=it.headText}}</p>
                        </div>
                        <div class="ic-summary__details" data-summarydetails data-binding="{{=it.questions[0].value}}" data-render="{{=it.bindings["info"].render}}">

                        </div>
                    </article>
                </div>
            </div>
        </section>
    </div>
</div>
