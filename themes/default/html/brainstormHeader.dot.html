{{? it.header}}
	<header class="brainstorm__header-main cl-header--main{{? it.header.pointer == false}} cl__pointer-hidden{{?}}">
		{{? it.header.title}}
			<h1 class="brainstorm__title-main cl-header__title--main">{{=it.header.title}}</h1>
		{{?}}
		{{? it.header.description}}
			<p class="brainstorm__description-main cl-header__description--main">{{=it.header.description}}</p>
		{{?}}
	</header>
{{?}}
