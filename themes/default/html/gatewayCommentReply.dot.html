<div class="gwc-comments__reply" data-reply-id="{{=it.reply.Id}}">
    <div class="gwc-comments__replyDetails"> 
        <span class="gwc-comments__replyParticipantName">{{=it.reply.Name}}, </span>
        <span class="gwc-comments__replyTime" data-reply-timeframe>{{=it.reply.CreatedOn}}</span>
    </div>
    <div class="gwc-comments__replyComment">
        <span>{{=it.reply.Body}}</span>
    </div>
</div>
