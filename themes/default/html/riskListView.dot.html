<div class="riskSingleQuadrant__table" data-list-table>
    {{~it.filteredArray :ideas:index }}
    <div class="riskSingleQuadrant__tableRow" data-list-row data-id="{{=ideas.IdeaId}}" data-ideaText="{{=ideas.IdeaText}}">
        <div class="riskSingleQuadrant__tableSequence riskSingleQuadrant__tableCell">
            <span class="riskSingleQuadrant__dot" data-dot="{{=index+1}}"></span>
            <span>{{=index+1}}</span>
        </div>
        <div class="riskSingleQuadrant__tableIdea riskSingleQuadrant__tableCell" >{{=ideas.IdeaText}}</div>
        {{~ideas.ideaAttr :attr:i }}
        <div class="riskSingleQuadrant__tableAttributes riskSingleQuadrant__tableCell {{=attr.key}}">
            <div class="riskSingleQuadrant__attribute">{{=attr.key}}</div>
            <div class="riskSingleQuadrant__values">{{=attr.value}}</div>
        </div>
        {{~}}
        <div class="riskSingleQuadrant__tableTeamNo riskSingleQuadrant__tableCell">
            <span class="riskSingleQuadrant__teamNo">{{=ideas.IdeaAuthorName}}</span>
        </div>
    </div>
    {{~}}
</div>
