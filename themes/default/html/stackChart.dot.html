<div class="mainContentWrapper">
    <div class="mainContent">
        <section class="sch cl-component">

            {{? it.header}}
                <!-- Header -->
                <header class="sch-header--main cl-header--main" data-stackchartheader>
                    {{? it.header.breadCrumbs}}
                        <p class="msc-breadCrumbs-main cl-header-breadCrumbs--main">{{=it.header.breadCrumbs}}</p>
                    {{?}}
                    {{? it.header.bgimage}}
                     <div class="msc-header-image cl-header-image" style="background-image:url({{=it.header.bgimage}})"></div>
                    {{?}}
                    <div class="msc-header-wrapper cl-header-wrapper">
						{{? it.header.title}}
							<h1 class="sch-header__title--main cl-header__title--main{{? !it.header.description}} cl-margin--no{{?}}">
								{{=it.header.title}}
							</h1>
						{{?}}
						{{? it.header.description}}
							<p class="sch-header__description--main cl-header__description--main">
								{{=it.header.description}}
							</p>
						{{?}}
					</div>
                </header>
            {{?}}

            <section class="sch-container cl-container">
                <div class="cl-xs-column-12 cl-row">
                    {{? it.instructions}}
                        <!-- Instructions -->
                        <div class="sch-instructions cl-instructions">
                            <p class="sch-instructions__text cl-instructions__text">{{=it.instructions}}</p>
                        </div>
                    {{?}}
                    <section class="sch-content cl-content" data-stackchartsection>
                        <article class="sch-content-stackedColumnChart--container" data-stackchartholder>
                            <!-- chart is rendered in this element -->
                        </article>
                    </section>
                </div>
            </section>
        </section>
    </div>
</div>
