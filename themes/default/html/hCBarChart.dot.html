<div class="mainContentWrapper">
    <div class="mainContent">
        <section class="bach cl-component">

            {{? it.header}}
                <!-- Header -->
                <header class="bach-header--main cl-header--main" data-stackedColumnChartHeader>
                    {{? it.header.title}}
                        <h1 class="bach-header__title--main cl-header__title--main{{? !it.header.description}} cl-margin--no{{?}}">
                            {{=it.header.title}}
                        </h1>
                    {{?}}
                    {{? it.header.description}}
                        <p class="bach-header__description--main cl-header__description--main">
                            {{=it.header.description}}
                        </p>
                    {{?}}
                </header>
            {{?}}

            <section class="bach-container cl-container">
                <div class="cl-xs-column-12 cl-row">
                    {{? it.instructions}}
                        <!-- Instructions -->
                        <div class="bach-instructions cl-instructions">
                            <p class="bach-instructions__text cl-instructions__text">{{=it.instructions}}</p>
                        </div>
                    {{?}}
                <section class="bach-content cl-content" data-stackedColumnChartSection>
                    <article class="bach-content-stackedColumnChart--container" data-stackedColumnChartHolder>
                        <!-- chart is rendered in this element -->
                    </article>
                </section>
            </section>
        </section>
    </div>
</div>
