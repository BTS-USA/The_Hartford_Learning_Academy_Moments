

<section class="rmd-body">
    <article class="rmd-date">
        <section class="rmd-date__container">
            <div class="rmd-date__month"><p>{{=it.reminderMonth}}</p></div>
            <div class="rmd-date__day"><p>{{=it.reminderDay}}</p></div>
            <div class="rmd-date__time"><p>{{=it.reminderTime}}</p></div>
        </section>
    </article>

    <article class="rmd-text">
        <div class="rmd-text__text"><p>{{=it.reminderText}}</p></div>
    </article>
</section>
