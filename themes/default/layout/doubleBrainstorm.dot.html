<section class="layoutContainer doubleBrainstorm">
    <article class="doubleBrainstorm-header">{{=it.components[0]}}</article>
    <article class="doubleBrainstorm-container">
        <section class="doubleBrainstorm-input-header">{{=it.components[1]}}</section>
        <section class="doubleBrainstorm-input-container">
            <article class="doubleBrainstorm-input cl-xs-column-12 cl-md-column-6">{{=it.components[2]}}</article>
            <article class="doubleBrainstorm-input cl-xs-column-12 cl-md-column-6">{{=it.components[3]}}</article>
        </section>
        <section class="doubleBrainstorm-textlist-header">{{=it.components[4]}}</section>
        <section class="doubleBrainstorm-textlist-container">
            <article class="doubleBrainstorm-textlist cl-xs-column-6 cl-md-column-6">{{=it.components[5]}}</article>
            <article class="doubleBrainstorm-textlist cl-xs-column-6 cl-md-column-6">{{=it.components[6]}}</article>
        </section>
    </article>
</section>
